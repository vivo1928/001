variables:
   ANDROID_HOME: $CI_PROJECT_DIR/android-sdk
   KEYSTORE_FILE: android/app/xxx.keystore
   KEYSTORE_PWD: 123456
   KEY_ALIAS: key0
   KEY_PWD: 123456
 stages:
   - prepare_sdk
   - build_apk
 install_sdk:
   stage: prepare_sdk
   script:
     - apt update && apt install -y default-jdk wget unzip apksigner
     - export JAVA_HOME=/usr/lib/jvm/default-java
     - mkdir -p $ANDROID_HOME/cmdline-tools
     - wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O sdk.zip
     - unzip sdk.zip -d $ANDROID_HOME/cmdline-tools
     - mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
     - yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android33" "build-tools;34.0.0"
 build_apk:
   stage: build_apk
   script:
     - export ANDROID_HOME=$CI_PROJECT_DIR/android-sdk
     - export JAVA_HOME=/usr/lib/jvm/default-java
     - cd android
     - chmod +x gradlew
     - ./gradlew assembleRelease
     - UNSIGNED_APK=app/build/outputs/apk/release/app-release-unsigned.apk
     - SIGNED_APK=app/build/outputs/apk/release/app-signed.apk
     - apksigner sign --ks $CI_PROJECT_DIR/$KEYSTORE_FILE --ks-pass pass:$KEYSTORE_PWD --key-pass pass:$KEY_PWD --out $SIGNED_APK $UNSIGNED_APK
   artifacts:
     paths:
       - android/app/build/outputs/apk/release/app-signed.apk
 
